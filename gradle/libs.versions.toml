coil = "3.2.0"
reorderable = "3.0.0"
material3 = "1.5.0-alpha11"
#material3Adaptive = "1.0.0"
#material3AdaptiveNav = "1.3.1"
splashscreen = "1.2.0"
graphicsShapes = "1.1.0"

[libraries]
androidx-graphics-shapes = { group = "androidx.graphics", name = "graphics-shapes", version.ref = "graphicsShapes" }
